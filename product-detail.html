<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Detail - FA Perfume</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .serif { font-family: 'Cormorant Garamond', serif; }
    .thumb-active { border-color: #5B4DBA !important; }
  </style>
</head>
<body class="bg-gray-50">

<!-- Navbar -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-md shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-9 h-9 bg-purple-700 rounded-xl flex items-center justify-center">
          <span class="text-white font-bold text-lg" style="font-family:'Georgia',serif;">FA</span>
        </div>
        <span class="hidden sm:block font-bold text-gray-900 text-base">FA Perfume</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="wishlist.html" class="relative p-2 text-gray-600 hover:text-purple-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
          <span class="wishlist-badge absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-xs rounded-full items-center justify-center font-bold" style="display:none;font-size:10px;"></span>
        </a>
        <a href="cart.html" class="relative p-2 text-gray-600 hover:text-purple-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span class="cart-badge absolute -top-1 -right-1 w-4 h-4 bg-purple-600 text-white text-xs rounded-full items-center justify-center font-bold" style="display:none;font-size:10px;"></span>
        </a>
      </div>
    </div>
  </div>
</nav>

<div class="pt-16">
  <!-- Breadcrumb -->
  <div class="bg-white border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3">
      <nav class="flex items-center gap-2 text-sm text-gray-500">
        <a href="index.html" class="hover:text-purple-700">Home</a>
        <span>/</span>
        <a href="shop.html" class="hover:text-purple-700">Shop</a>
        <span>/</span>
        <span id="breadcrumbName" class="text-gray-900 font-medium">Product</span>
      </nav>
    </div>
  </div>

  <!-- Product Detail -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div id="productContent">
      <!-- Loading -->
      <div class="text-center py-20 text-gray-400">
        <div class="text-5xl mb-4 animate-spin">⌛</div>
        <p>Memuat produk...</p>
      </div>
    </div>

    <!-- Related Products -->
    <div class="mt-16">
      <h2 class="serif text-3xl font-semibold text-gray-900 mb-6">Produk Terkait</h2>
      <div id="relatedGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-gray-900 text-white py-8 mt-16">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-gray-500">
    <p>© 2026 FA Perfume Official Store. All rights reserved.</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const productId = parseInt(urlParams.get('id')) || 1;
  const product = FA.products.find(p => p.id === productId);

  if (product) {
    document.title = `${product.name} - FA Perfume`;
    document.getElementById('breadcrumbName').textContent = product.name;
    
    let selectedSize = product.sizes[0];
    let qty = 1;
    const discount = Math.round((1 - product.price / product.originalPrice) * 100);
    
    const images = [product.heroImage, product.detailImage];
    
    document.getElementById('productContent').innerHTML = `
      <div class="grid md:grid-cols-2 gap-10">
        <!-- Left: Gallery -->
        <div>
          <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 mb-4 aspect-square">
            <img id="mainImg" src="${product.heroImage}" alt="${product.name}" 
                 class="w-full h-full object-cover"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22><rect fill=%22%23ede9fe%22 width=%22400%22 height=%22400%22/><text x=%22200%22 y=%22200%22 text-anchor=%22middle%22 fill=%22%235B4DBA%22 font-size=%2260%22>FA</text></svg>'"/>
          </div>
          <div class="flex gap-3">
            ${images.map((img, i) => `
              <button onclick="switchImg('${img}', this)" 
                      class="thumb-btn w-20 h-20 rounded-xl overflow-hidden border-2 ${i===0?'thumb-active border-purple-600':'border-gray-200'} hover:border-purple-400 transition-colors flex-shrink-0">
                <img src="${img}" alt="thumb" class="w-full h-full object-cover"
                     onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23f3f4f6%22 width=%22200%22 height=%22200%22/></svg>'"/>
              </button>
            `).join('')}
          </div>
        </div>

        <!-- Right: Info -->
        <div>
          <div class="flex items-center gap-2 mb-2">
            <span class="bg-purple-100 text-purple-700 text-xs font-semibold px-3 py-1 rounded-full">${product.categoryLabel}</span>
            ${product.badge ? `<span class="bg-purple-600 text-white text-xs font-semibold px-3 py-1 rounded-full">${product.badge}</span>` : ''}
          </div>
          <h1 class="serif text-4xl font-semibold text-gray-900 mb-1">${product.name}</h1>
          <p class="text-gray-500 text-sm mb-3">Inspired by <strong>${product.inspired}</strong></p>
          
          <div class="flex items-center gap-2 mb-4">
            <span class="text-yellow-400 text-lg">${'★'.repeat(Math.floor(product.rating))}</span>
            <span class="font-bold text-gray-900">${product.rating}</span>
            <span class="text-gray-500 text-sm">(${product.reviews} ulasan)</span>
          </div>
          
          <div class="flex items-baseline gap-3 mb-5">
            <span class="text-3xl font-bold text-purple-700">${FA.formatPrice(product.price)}</span>
            <span class="text-gray-400 line-through text-lg">${FA.formatPrice(product.originalPrice)}</span>
            <span class="bg-red-100 text-red-600 text-xs font-bold px-2 py-1 rounded-full">-${discount}%</span>
          </div>

          <p class="text-gray-600 leading-relaxed mb-5 text-sm">${product.description}</p>
          
          <!-- Notes -->
          <div class="grid grid-cols-3 gap-3 mb-5">
            <div class="bg-purple-50 rounded-xl p-3">
              <p class="text-xs font-bold text-purple-700 mb-2 uppercase tracking-wide">Top Notes</p>
              ${product.topNotes.map(n => `<p class="text-xs text-gray-600">${n}</p>`).join('')}
            </div>
            <div class="bg-indigo-50 rounded-xl p-3">
              <p class="text-xs font-bold text-indigo-700 mb-2 uppercase tracking-wide">Middle Notes</p>
              ${product.middleNotes.map(n => `<p class="text-xs text-gray-600">${n}</p>`).join('')}
            </div>
            <div class="bg-violet-50 rounded-xl p-3">
              <p class="text-xs font-bold text-violet-700 mb-2 uppercase tracking-wide">Base Notes</p>
              ${product.baseNotes.map(n => `<p class="text-xs text-gray-600">${n}</p>`).join('')}
            </div>
          </div>
          
          <!-- Size -->
          <div class="mb-4">
            <p class="text-sm font-semibold text-gray-900 mb-2">Ukuran:</p>
            <div class="flex gap-2" id="sizeSelector">
              ${product.sizes.map((s, i) => `
                <button onclick="selectSize('${s}', this)" 
                        class="size-btn px-5 py-2 rounded-xl border-2 text-sm font-medium transition-colors ${i===0?'border-purple-600 bg-purple-600 text-white':'border-gray-200 text-gray-700 hover:border-purple-400'}">
                  ${s}
                </button>
              `).join('')}
            </div>
          </div>
          
          <!-- Qty -->
          <div class="flex items-center gap-4 mb-5">
            <p class="text-sm font-semibold text-gray-900">Jumlah:</p>
            <div class="flex items-center gap-0 border border-gray-200 rounded-xl overflow-hidden">
              <button onclick="changeQty(-1)" class="w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-purple-50 transition-colors font-bold">−</button>
              <span id="qtyDisplay" class="w-12 text-center text-gray-900 font-medium text-sm">${qty}</span>
              <button onclick="changeQty(1)" class="w-10 h-10 flex items-center justify-center text-gray-600 hover:bg-purple-50 transition-colors font-bold">+</button>
            </div>
            <span class="text-xs text-gray-400">Stok: ${product.stock}</span>
          </div>
          
          <!-- Actions -->
          <div class="flex gap-3 mb-4">
            <button onclick="addToCartWithQty()" class="flex-1 bg-purple-700 text-white font-semibold py-3.5 rounded-2xl hover:bg-purple-800 transition-colors text-sm">
              🛒 Add to Cart
            </button>
            <button onclick="buyNow()" class="flex-1 border-2 border-purple-700 text-purple-700 font-semibold py-3.5 rounded-2xl hover:bg-purple-50 transition-colors text-sm">
              ⚡ Buy Now
            </button>
          </div>
          <button onclick="toggleWishlist()" id="wishlistBtn" class="w-full border border-gray-200 text-gray-600 font-medium py-3 rounded-2xl hover:border-red-300 hover:text-red-500 transition-colors text-sm">
            ♥ Tambah ke Wishlist
          </button>
          
          <!-- Features -->
          <div class="grid grid-cols-3 gap-3 mt-5">
            <div class="text-center p-3 bg-gray-50 rounded-xl">
              <p class="text-lg mb-1">🚚</p>
              <p class="text-xs text-gray-600 font-medium">Free Ongkir</p>
            </div>
            <div class="text-center p-3 bg-gray-50 rounded-xl">
              <p class="text-lg mb-1">🔄</p>
              <p class="text-xs text-gray-600 font-medium">Retur 2x24 Jam</p>
            </div>
            <div class="text-center p-3 bg-gray-50 rounded-xl">
              <p class="text-lg mb-1">✅</p>
              <p class="text-xs text-gray-600 font-medium">Garansi Asli</p>
            </div>
          </div>
        </div>
      </div>
    `;

    // Related
    const related = FA.products.filter(p => p.id !== productId && p.category === product.category).slice(0, 4);
    document.getElementById('relatedGrid').innerHTML = related.map(p => FA.renderProductCard(p, '.')).join('');

    // Initialize wishlist button
    updateWishlistBtn();

    function switchImg(src, btn) {
      document.getElementById('mainImg').src = src;
      document.querySelectorAll('.thumb-btn').forEach(b => b.classList.remove('thumb-active', 'border-purple-600'));
      btn.classList.add('thumb-active', 'border-purple-600');
    }
    window.switchImg = switchImg;

    function selectSize(size, btn) {
      selectedSize = size;
      document.querySelectorAll('.size-btn').forEach(b => {
        b.className = 'size-btn px-5 py-2 rounded-xl border-2 text-sm font-medium transition-colors border-gray-200 text-gray-700 hover:border-purple-400';
      });
      btn.className = 'size-btn px-5 py-2 rounded-xl border-2 text-sm font-medium transition-colors border-purple-600 bg-purple-600 text-white';
    }
    window.selectSize = selectSize;

    function changeQty(delta) {
      qty = Math.max(1, Math.min(product.stock, qty + delta));
      document.getElementById('qtyDisplay').textContent = qty;
    }
    window.changeQty = changeQty;

    function addToCartWithQty() {
      FA.addToCart(productId, qty, selectedSize);
    }
    window.addToCartWithQty = addToCartWithQty;

    function buyNow() {
      FA.addToCart(productId, qty, selectedSize);
      window.location.href = 'cart.html';
    }
    window.buyNow = buyNow;

    function toggleWishlist() {
      FA.addToWishlist(productId);
      updateWishlistBtn();
    }
    window.toggleWishlist = toggleWishlist;

    function updateWishlistBtn() {
      const btn = document.getElementById('wishlistBtn');
      if (!btn) return;
      if (FA.isInWishlist(productId)) {
        btn.innerHTML = '❤️ Di Wishlist';
        btn.className = 'w-full border border-red-300 text-red-500 font-medium py-3 rounded-2xl hover:bg-red-50 transition-colors text-sm';
      } else {
        btn.innerHTML = '♥ Tambah ke Wishlist';
        btn.className = 'w-full border border-gray-200 text-gray-600 font-medium py-3 rounded-2xl hover:border-red-300 hover:text-red-500 transition-colors text-sm';
      }
    }

  } else {
    document.getElementById('productContent').innerHTML = `
      <div class="text-center py-20">
        <p class="text-2xl mb-4">😕</p>
        <h2 class="text-xl font-bold text-gray-900 mb-2">Produk tidak ditemukan</h2>
        <a href="shop.html" class="text-purple-700 hover:underline">Kembali ke Shop</a>
      </div>
    `;
  }
</script>
</body>
</html>
